<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- 모바일 앱처럼: 확대/축소 차단 + 노치 안전영역 대응 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#08090C" />

    <!-- iOS/안드로이드 홈화면 설치 시 네이티브 앱 느낌 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="COCKSLIGHTING" />
    
    <!-- 브라우저 탭 제목 -->
    <title>⚡ COCKSLIGHTING</title>
    
    <!-- 링크 공유 시 미리보기 정보 (SEO 및 공유 기능 향상) -->
    <meta name="description" content="실시간 배드민턴 경기 관리 시스템" />
    <meta property="og:type" content="website">
    <meta property="og:title" content="⚡ COCKSLIGHTING">
    <meta property="og:description" content="실시간 경기 관리 시스템">
    <!-- <meta property="og:image" content="https://example.com/your-preview-image.jpg"> -->
    <meta property="og:url" content="https://badminton-app-new.vercel.app/">

    <!-- 아이콘 표시를 위한 Font Awesome 라이브러리 링크 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" xintegrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
       <!-- 구글 폰트 링크: 디스플레이(Anton) + 본문 한글(Noto Sans KR) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- React 앱이 렌더링될 DOM 컨테이너 -->
    <div id="root"></div>
    <!-- Vite 프로젝트의 진입점(entry point) 스크립트 -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- 모바일에서 핀치 확대/더블탭 확대 차단 (iOS Safari는 user-scalable=no를 무시하므로 필요) -->
    <script>
      (function () {
        // iOS 핀치 줌(제스처) 차단
        ['gesturestart', 'gesturechange', 'gestureend'].forEach(function (evt) {
          document.addEventListener(evt, function (e) { e.preventDefault(); }, { passive: false });
        });
        // 두 손가락 이상 터치(핀치) 차단
        document.addEventListener('touchmove', function (e) {
          if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        // 더블탭 확대 차단 (클릭은 유지)
        var lastTouchEnd = 0;
        document.addEventListener('touchend', function (e) {
          var now = Date.now();
          if (now - lastTouchEnd <= 300) e.preventDefault();
          lastTouchEnd = now;
        }, { passive: false });
        // Ctrl/⌘ + 휠 확대 차단 (데스크톱 보조)
        document.addEventListener('wheel', function (e) {
          if (e.ctrlKey) e.preventDefault();
        }, { passive: false });
      })();
    </script>
  </body>
</html>
